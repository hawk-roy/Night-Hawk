services:
  redis:
    image: redis:7
    container_name: go-order-service-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
  mysql:
    image: mysql:8.0
    container_name: go-order-service-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-go_order_service}
      MYSQL_USER: ${MYSQL_USER:-order_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-order_pass}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: